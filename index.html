<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoultryVision AI | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100 g-4">
      <div class="col-lg-6 d-none d-lg-block">
        <div class="hero-card p-5 text-white h-100">
          <div class="mb-4">
            <span class="badge rounded-pill bg-light text-dark px-3 py-2">Fast Offline Trainer</span>
          </div>
          <h1 class="display-5 fw-bold mb-3">PoultryVision AI</h1>
          <p class="lead opacity-75">Train your own chicken image classifier inside your browser without heavy MobileNet loading.</p>
          <div class="row g-3 mt-4">
            <div class="col-6"><div class="mini-stat"><i class="bi bi-lightning-charge"></i><span>Fast training</span></div></div>
            <div class="col-6"><div class="mini-stat"><i class="bi bi-hdd-network"></i><span>Offline model</span></div></div>
            <div class="col-6"><div class="mini-stat"><i class="bi bi-images"></i><span>Image preview</span></div></div>
            <div class="col-6"><div class="mini-stat"><i class="bi bi-person-check"></i><span>Role accounts</span></div></div>
          </div>
        </div>
      </div>
      <div class="col-lg-5 col-md-8">
        <div class="glass-card p-4 p-md-5">
          <div class="text-center mb-4">
            <div class="brand-circle mx-auto mb-3"><i class="bi bi-robot"></i></div>
            <h2 class="fw-bold mb-1">Welcome back</h2>
            <p class="text-muted mb-0">Sign in to your dashboard</p>
          </div>
          <form id="loginForm" class="vstack gap-3">
            <div>
              <label class="form-label">Username</label>
              <div class="input-group input-group-lg">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
              </div>
            </div>
            <div>
              <label class="form-label">Password</label>
              <div class="input-group input-group-lg">
                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <button class="btn btn-gradient btn-lg w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
          </form>
          <div class="d-flex justify-content-between mt-3 small text-muted flex-wrap gap-2">
            <span>Demo: <strong>admin / admin123</strong></span>
            <a href="register.html" class="text-decoration-none">Create account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
