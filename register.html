<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | PoultryVision AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="container py-5">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-lg-6 col-md-8">
      <div class="glass-card p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="brand-circle mx-auto mb-3"><i class="bi bi-person-plus"></i></div>
          <h2 class="fw-bold">Create Account</h2>
          <p class="text-muted mb-0">Frontend-only local account storage</p>
        </div>
        <form id="registerForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control form-control-lg" id="fullName" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" class="form-control form-control-lg" id="newUsername" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control form-control-lg" id="email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Role</label>
            <select id="role" class="form-select form-select-lg">
              <option value="analyst">Analyst</option>
              <option value="user">User</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" id="newPassword" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control form-control-lg" id="confirmPassword" required>
          </div>
          <div class="col-12 d-grid gap-2">
            <button class="btn btn-gradient btn-lg" type="submit"><i class="bi bi-check2-circle me-2"></i>Create Account</button>
            <a href="index.html" class="btn btn-outline-secondary btn-lg">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
