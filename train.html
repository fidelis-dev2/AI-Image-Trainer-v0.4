<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Model | PoultryVision AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div>
      <div class="sidebar-brand"><i class="bi bi-robot"></i><span>PoultryVision AI</span></div>
      <div class="nav flex-column nav-pills gap-2 mt-4">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a class="nav-link active" href="train.html"><i class="bi bi-mortarboard-fill"></i> Train Model</a>
        <a class="nav-link" href="predict.html"><i class="bi bi-search-heart-fill"></i> Predict</a>
        <a class="nav-link admin-only" href="users.html"><i class="bi bi-people-fill"></i> Users</a>
      </div>
    </div>
    <button class="btn btn-outline-light w-100 mt-4" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>Logout</button>
  </aside>
  <main class="main-panel">
    <div class="topbar mb-4">
      <div>
        <h3 class="fw-bold mb-1">Train Lightweight Model</h3>
        <p class="text-muted mb-0">Upload images for each class. Preview appears below before training.</p>
      </div>
      <button class="btn btn-gradient" id="addClassBtn"><i class="bi bi-plus-circle me-2"></i>Add Class</button>
    </div>

    <div class="content-card p-4 mb-4">
      <div id="classContainer" class="row g-4"></div>
      <div class="d-flex flex-wrap gap-2 mt-4">
        <button class="btn btn-primary" id="trainBtn"><i class="bi bi-cpu me-2"></i>Train Model</button>
        <button class="btn btn-outline-danger" id="resetDatasetBtn"><i class="bi bi-trash me-2"></i>Reset Dataset</button>
      </div>
    </div>

    <div class="content-card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">Training Status</h5>
        <span class="badge text-bg-info" id="datasetBadge">0 classes configured</span>
      </div>
      <div class="progress soft-progress mb-3" role="progressbar"><div class="progress-bar" id="trainingProgress" style="width:0%">0%</div></div>
      <div id="trainingLog" class="small text-muted">No training started yet.</div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/trainer.js"></script>
</body>
</html>
