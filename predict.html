<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict | PoultryVision AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div>
      <div class="sidebar-brand"><i class="bi bi-robot"></i><span>PoultryVision AI</span></div>
      <div class="nav flex-column nav-pills gap-2 mt-4">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a class="nav-link" href="train.html"><i class="bi bi-mortarboard-fill"></i> Train Model</a>
        <a class="nav-link active" href="predict.html"><i class="bi bi-search-heart-fill"></i> Predict</a>
        <a class="nav-link admin-only" href="users.html"><i class="bi bi-people-fill"></i> Users</a>
      </div>
    </div>
    <button class="btn btn-outline-light w-100 mt-4" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>Logout</button>
  </aside>
  <main class="main-panel">
    <div class="topbar mb-4">
      <div>
        <h3 class="fw-bold mb-1">Predict Image</h3>
        <p class="text-muted mb-0">Uses lightweight centroid classification saved from your training session.</p>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="content-card p-4 h-100">
          <label class="form-label fw-semibold">Upload Image</label>
          <input type="file" class="form-control form-control-lg mb-3" id="predictFile" accept="image/*">
          <div class="preview-large" id="predictPreviewWrap">
            <img id="predictPreview" alt="preview" class="d-none">
            <div id="previewPlaceholder" class="text-muted">Image preview will appear here</div>
          </div>
          <button class="btn btn-gradient mt-3" id="predictBtn"><i class="bi bi-stars me-2"></i>Run Prediction</button>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="content-card p-4 h-100">
          <h5 class="fw-bold mb-3">Prediction Result</h5>
          <div id="predictionResult" class="small text-muted">No prediction yet.</div>
          <div id="scoreBars" class="mt-3"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/predict.js"></script>
</body>
</html>
